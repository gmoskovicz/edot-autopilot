# OTEL_SERVICE_NAME env var sets the OTel service name in spans;
# spring.application.name must match it for Spring Boot to use the same value.
spring.application.name=${OTEL_SERVICE_NAME:edot-springboot-tier-a}

# Enable Spring Boot tracing via Micrometer + OTel bridge
management.tracing.sampling.probability=1.0

# OTLP exporter endpoint for traces (Spring Boot 3.x property)
# Falls back to http://localhost:4318/v1/traces if env var not set
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

# Expose actuator health endpoint (used by CI healthcheck)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
