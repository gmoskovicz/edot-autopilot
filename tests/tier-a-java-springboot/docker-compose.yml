services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      OTEL_SERVICE_NAME: edot-springboot-tier-a
      OTEL_EXPORTER_OTLP_ENDPOINT: ${ELASTIC_OTLP_ENDPOINT}
      OTEL_EXPORTER_OTLP_HEADERS: Authorization=ApiKey ${ELASTIC_API_KEY}
      OTEL_DEPLOYMENT_ENVIRONMENT: ${OTEL_DEPLOYMENT_ENVIRONMENT:-development}
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
