name: EDOT Autopilot CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Nightly at 06:00 UTC
    - cron: '0 6 * * *'

jobs:
  # ── Job 1: Syntax + structure check ─────────────────────────────────────────
  # Runs on every push and PR. No credentials required.
  syntax-check:
    name: Syntax & Structure Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install core OTel packages (no credentials needed)
        run: |
          pip install --quiet \
            opentelemetry-sdk \
            opentelemetry-exporter-otlp-proto-http \
            python-dotenv

      - name: Compile all smoke-test Python files
        run: python -m compileall smoke-tests/ -q

      - name: Compile sidecar
        run: |
          python -m py_compile otel-sidecar/otel-sidecar.py
          python -m py_compile observability-edot-autopilot/scripts/otel-sidecar.py

      - name: Verify record_exception is used (not add_event) in sidecar
        run: |
          if grep -n 'add_event.*"exception"' \
               otel-sidecar/otel-sidecar.py \
               observability-edot-autopilot/scripts/otel-sidecar.py; then
            echo "FAIL: sidecar still uses add_event for exceptions — use record_exception instead"
            exit 1
          fi
          echo "PASS: sidecar uses record_exception correctly"

      - name: Verify required files exist in reference apps
        run: |
          MISSING=0
          for app in tests/tier-a-python-fastapi tests/tier-a-nodejs-express tests/tier-a-java-springboot; do
            if [ ! -f "$app/Dockerfile" ]; then
              echo "MISSING Dockerfile in $app"
              MISSING=$((MISSING+1))
            fi
            if [ ! -f "$app/docker-compose.yml" ]; then
              echo "MISSING docker-compose.yml in $app"
              MISSING=$((MISSING+1))
            fi
          done
          if [ $MISSING -gt 0 ]; then
            echo "FAIL: $MISSING required file(s) missing from reference apps"
            exit 1
          fi
          echo "PASS: All reference app files present"

      - name: Lint smoke test structure (CHECKS pattern)
        run: |
          # Every smoke.py must define CHECKS, use check(), and call sys.exit(1)
          FAIL=0
          while IFS= read -r f; do
            if ! grep -q "^CHECKS" "$f"; then
              echo "MISSING CHECKS list: $f"
              FAIL=$((FAIL+1))
            fi
            if ! grep -q "def check(" "$f"; then
              echo "MISSING check() function: $f"
              FAIL=$((FAIL+1))
            fi
            if ! grep -q "sys.exit(1)" "$f"; then
              echo "MISSING sys.exit(1): $f"
              FAIL=$((FAIL+1))
            fi
          done < <(find smoke-tests -name "smoke.py")
          if [ $FAIL -gt 0 ]; then
            echo "FAIL: $FAIL smoke.py file(s) missing canonical CHECKS pattern"
            exit 1
          fi
          echo "PASS: All $(find smoke-tests -name smoke.py | wc -l | tr -d ' ') smoke.py files follow CHECKS pattern"

      - name: Validate blank fixtures contain no pre-existing OTel
        run: |
          # Only check single-tier tests (01–59). Tests 60+ are complex scenarios
          # where fixtures may be partially instrumented by design (e.g. 88-pre-existing-otel).
          FAIL=0
          while IFS= read -r dir; do
            for src in "$dir/app.py" "$dir/requirements.txt" "$dir/package.json"; do
              if [ -f "$src" ] && grep -qi "opentelemetry\|elastic-apm\|ddtrace\|newrelic" "$src"; then
                echo "FAIL: fixture already has instrumentation — $src"
                FAIL=$((FAIL+1))
              fi
            done
          done < <(find smoke-tests/0[0-9]-*/fixtures smoke-tests/[1-5][0-9]-*/fixtures \
                        -mindepth 1 -maxdepth 1 -type d 2>/dev/null)
          if [ $FAIL -gt 0 ]; then
            echo "FAIL: $FAIL fixture file(s) contain pre-existing instrumentation"
            exit 1
          fi
          echo "PASS: All single-tier blank fixtures are clean"

  # ── Job 2: Docker build check ────────────────────────────────────────────────
  # Builds all reference app Docker images on every push and PR.
  # Catches Dockerfile / pom.xml / requirements.txt errors before they hit main.
  docker-build-check:
    name: Docker Build Check (reference apps)
    runs-on: ubuntu-latest
    needs: syntax-check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Python FastAPI image
        run: docker build --no-cache -t edot-test-python tests/tier-a-python-fastapi/

      - name: Build Node.js Express image
        run: docker build --no-cache -t edot-test-nodejs tests/tier-a-nodejs-express/

      - name: Build Java Spring Boot image
        run: docker build --no-cache -t edot-test-java tests/tier-a-java-springboot/

  # ── Job 3: SDK Integration Tests (Docker, no credentials) ───────────────────
  # Builds and runs Java / Node.js / Python services against a local OTel
  # Collector (file exporter). Validates real spans are produced.
  # No Elastic credentials required.
  sdk-integration:
    name: SDK Integration Tests (Docker)
    runs-on: ubuntu-latest
    needs: docker-build-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run integration tests
        working-directory: tests/integration
        run: bash run.sh

      - name: Upload collector output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: collector-output
          path: tests/integration/output/
          if-no-files-found: ignore

  # ── Job 4: Full smoke test suite ─────────────────────────────────────────────
  # Runs on push to main, workflow_dispatch, and nightly schedule.
  # Skipped on pull requests from forks (no access to secrets).
  smoke-tests:
    name: Smoke Tests (live Elastic)
    runs-on: ubuntu-latest
    needs: syntax-check
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule'
    env:
      ELASTIC_OTLP_ENDPOINT: ${{ secrets.ELASTIC_OTLP_ENDPOINT }}
      ELASTIC_API_KEY: ${{ secrets.ELASTIC_API_KEY }}
      ELASTICSEARCH_URL: ${{ secrets.ELASTICSEARCH_URL }}
      ELASTICSEARCH_API_KEY: ${{ secrets.ELASTICSEARCH_API_KEY }}
      OTEL_DEPLOYMENT_ENVIRONMENT: ci-smoke-test
      SIDECAR_PORT: 9411
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node.js (for Tier A Node.js test)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python dependencies
        run: pip install --quiet -r smoke-tests/requirements.txt

      - name: Install Node.js dependencies
        run: |
          if [ -f smoke-tests/02-tier-a-nodejs/package.json ]; then
            cd smoke-tests/02-tier-a-nodejs && npm install --silent
          fi

      - name: Validate Elastic credentials are set
        run: |
          if [ -z "$ELASTIC_OTLP_ENDPOINT" ] || [ -z "$ELASTIC_API_KEY" ]; then
            echo "SKIP: ELASTIC_OTLP_ENDPOINT / ELASTIC_API_KEY not configured."
            echo "      Add them in repo Settings → Secrets → Actions to enable live smoke tests."
            exit 0
          fi
          echo "Endpoint: $ELASTIC_OTLP_ENDPOINT"

      - name: Write .env for smoke tests
        run: |
          cat > smoke-tests/.env <<EOF
          ELASTIC_OTLP_ENDPOINT=${ELASTIC_OTLP_ENDPOINT}
          ELASTIC_API_KEY=${ELASTIC_API_KEY}
          ELASTICSEARCH_URL=${ELASTICSEARCH_URL:-}
          ELASTICSEARCH_API_KEY=${ELASTICSEARCH_API_KEY:-}
          OTEL_DEPLOYMENT_ENVIRONMENT=${OTEL_DEPLOYMENT_ENVIRONMENT}
          SIDECAR_PORT=${SIDECAR_PORT}
          EOF

      - name: Run smoke test suite
        run: |
          cd smoke-tests
          bash run-all.sh

      - name: Upload smoke test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-logs
          path: smoke-tests/*.log
          if-no-files-found: ignore

  # ── Job 5: Telemetry contract validation ─────────────────────────────────────
  # Runs on every push and PR. No credentials required — pure static analysis.
  # Validates that reference app source files satisfy their declared span attribute contracts.
  contract-check:
    name: Telemetry Contract Check
    runs-on: ubuntu-latest
    needs: syntax-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: pip install --quiet pyyaml

      - name: Validate telemetry contracts against reference apps
        run: |
          python tools/otel-contracts.py validate \
            --contracts tools/test_contracts.yaml \
            --root .

      - name: Syntax-check otel-contracts.py
        run: |
          python -m py_compile tools/otel-contracts.py
          echo "PASS: otel-contracts.py compiles"

  # ── Job 6: E2E Instrumentation Test ──────────────────────────────────────────
  # Claude instruments a blank app from scratch; spans validated via local OTel Collector.
  #
  # Auth flow:
  #   Claude Code CLI uses Anthropic format:  x-api-key: <key>
  #   Elastic EIS requires:                   Authorization: ApiKey <key>
  #   Solution: eis-proxy.py translates the header on the fly, running on localhost:9999.
  #   ANTHROPIC_BASE_URL for the test is overridden to http://127.0.0.1:9999
  #   so Claude Code talks to the proxy, which forwards to the real EIS endpoint.
  e2e-integration:
    name: E2E Instrumentation Test (Claude instruments blank app)
    runs-on: ubuntu-latest
    needs: syntax-check
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule'
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      EIS_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check EIS credentials are set
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ] || [ -z "$EIS_BASE_URL" ]; then
            echo "SKIP: ANTHROPIC_API_KEY / ANTHROPIC_BASE_URL not configured — skipping E2E test."
            echo "      Add them in repo Settings → Secrets → Actions (use Elastic EIS credentials)."
            exit 0
          fi
          echo "EIS endpoint configured."

      - name: Start EIS auth proxy (localhost:9999 → EIS)
        run: |
          python3 tests/e2e-integration/eis-proxy.py \
            --target "$EIS_BASE_URL" \
            --port 9999 &
          # Wait for the proxy to bind its port
          for i in $(seq 1 10); do
            sleep 1
            if curl -sf http://127.0.0.1:9999/ >/dev/null 2>&1 || \
               nc -z 127.0.0.1 9999 2>/dev/null; then
              echo "Proxy ready"
              break
            fi
          done

      - name: Run E2E instrumentation test
        env:
          ANTHROPIC_BASE_URL: http://127.0.0.1:9999
        run: python3 tests/e2e-integration/run.py

      - name: Upload collector output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-collector-output
          path: tests/e2e-integration/output/
          if-no-files-found: ignore
